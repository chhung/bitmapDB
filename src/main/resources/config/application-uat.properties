spring.application.name=bitmapDB
server.port=8080

# -----------------------------------------------------------
# Config import strategy
# -----------------------------------------------------------
# spring.config.import 的 file:./ 永遠相對於 JVM 工作目錄，
# 不會跟著 spring.config.location 改變。
#
# 因此需要使用自訂 property 作為基準路徑：
#   IDE:  -Dconfig.base=./src/main/resources/config
#   JAR:  -Dconfig.base=./config
# -----------------------------------------------------------
spring.config.import=\
  optional:file:${config.base}/datasource/mongo-uat.properties,\
  optional:file:${config.base}/middleware/redis-uat.properties

# To switch environment, pass at startup:
#   --spring.profiles.active=uat
# To specify Redis mode:
#   --app.redis.mode=single   (use Redis single server)
#   --app.redis.mode=cluster  (use Redis cluster)
