spring.application.name=coupon-platform
server.port=8080

# Active profile defaults to prod.
# To load profile-specific DB config, pass at startup:
#   --spring.config.additional-location=optional:classpath:/database/mongo/
# For production (external path managed by ops):
#   --spring.config.additional-location=optional:file:/etc/coupon-platform/
# To switch environment, also add:
#   --spring.profiles.active=uat
spring.profiles.default=prod
